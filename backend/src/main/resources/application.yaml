spring:
  application:
    name: gema

  datasource:
    url: jdbc:postgresql://localhost:5432/gema
    username: postgres
    password: postgres

  liquibase:
    change-log: classpath:db/changelog/db.changelog.yml

  jpa:
    hibernate:
      ddl-auto: validate

jwt:
  secret: ${JWT_SECRET:dev-only-insecure-secret-please-override-CHANGE_ME_32_BYTES_MIN}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}